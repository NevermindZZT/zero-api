services:
  zero-api:
    image: nevermindzzt/zero-api:latest
    container_name: zero-api
    restart: unless-stopped
    ports:
      - "8080:8080"   # API 服务
      - "8520:8520"   # 代理服务
    volumes:
      - ./data:/app/data
      - ./certs:/app/certs
      - ./configs:/app/configs:ro
    environment:
      - TZ=Asia/Shanghai
