name: Build

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64]
        include:
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          SUFFIX=""
          if [ "${{ matrix.goos }}" = "windows" ]; then SUFFIX=".exe"; fi
          go build -ldflags="-s -w" -o "zero-api-${{ matrix.goos }}-${{ matrix.goarch }}${SUFFIX}" ./cmd/server/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zero-api-${{ matrix.goos }}-${{ matrix.goarch }}
          path: zero-api-${{ matrix.goos }}-${{ matrix.goarch }}*
          if-no-files-found: error

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: zero-api-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum zero-api-* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            zero-api-*
            checksums.txt
          generate_release_notes: true
