# zero-api 配置文件
server:
  host: "0.0.0.0"
  port: 8080

proxy:
  enabled: true
  host: "0.0.0.0"
  port: 8520
  # 直接拦截的域名列表（MITM 解密）
  intercept_domains:
    - "api.openai.com"
    - "api.anthropic.com"
    - "openrouter.ai"
    - "generativelanguage.googleapis.com"
  # 智能拦截域名（仅拦截 LLM 推理请求）
  smart_intercept_domains: []

upstream:
  # 上游请求超时时间（秒）。超时会触发渠道故障切换
  request_timeout_seconds: 60

database:
  path: "data/zero-api.db"

auth:
  enabled: true
  username: "admin"
  password: "admin123"
  secret: "change-me-to-a-random-string"

# 模型默认数据（优先级高于内置数据库，低于上游 API 和用户手动编辑）
# 在此处预填模型的定价、上下文窗口、支持特性等
model_defaults:
  # GLM / 智谱
  glm-5.2:
    pricing_input: 1.40
    pricing_output: 4.40
    pricing_cache_read: 0.26
    context_window: 1000000
    max_output_tokens: 128000
    supports_thinking: true
    supports_vision: true
  glm-5.1:
    pricing_input: 1.40
    pricing_output: 4.40
    pricing_cache_read: 0.26
  # Kimi / Moonshot
  kimi-k2.7-code:
